name: Action Smoke

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: action-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate a conformant bundle (expect success)
        uses: ./
        with:
          bundle-path: tests/fixtures/good_bundle

      - name: Validate a non-conformant bundle (expect the gate to fail)
        id: bad
        uses: ./
        continue-on-error: true
        with:
          bundle-path: tests/fixtures/bad_bundle

      - name: Assert the non-conformant bundle failed the gate
        if: steps.bad.outcome != 'failure'
        run: |
          echo "expected the bad_bundle validate action to fail, but it ${{ steps.bad.outcome }}"
          exit 1
